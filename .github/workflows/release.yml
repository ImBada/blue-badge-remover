name: Release Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      # dist/ 폴더를 zip으로 패키징
      - name: Package extension
        run: |
          cd dist
          zip -r ../blue-badge-remover-${{ github.ref_name }}.zip .

      # GitHub Release 생성 + zip 첨부
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: blue-badge-remover-${{ github.ref_name }}.zip
          generate_release_notes: true
